<!doctype html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#efebe1" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1c1916" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Mongoose 控制台</title>
    <script>
      (function () {
        if (localStorage.getItem('mongoose-theme') === 'light') {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    <style>
      :root {
        --boot-bg-dark: #1c1916;
        --boot-card-dark: #25201a;
        --boot-border-dark: #3a3329;
        --boot-text-dark: #f1ead9;
        --boot-muted-dark: #9a9181;

        --boot-bg-light: #efebe1;
        --boot-card-light: #faf6ec;
        --boot-border-light: #ddd4c0;
        --boot-text-light: #262422;
        --boot-muted-light: #857d71;

        --boot-brand: #c96442;
        --boot-brand-deep: #a14a2d;
      }

      .boot-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 20px;
        background: var(--boot-bg-dark);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, "PingFang SC", "Microsoft YaHei UI", sans-serif;
        background-image:
          radial-gradient(at 20% 12%, rgba(230, 130, 96, 0.08) 0px, transparent 55%),
          radial-gradient(at 82% 88%, rgba(230, 130, 96, 0.04) 0px, transparent 55%);
      }

      .boot-card {
        position: relative;
        width: min(100%, 420px);
        border: 1px solid var(--boot-border-dark);
        border-radius: 22px;
        background: var(--boot-card-dark);
        padding: 36px 32px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.48), 0 2px 6px rgba(0, 0, 0, 0.24);
      }

      .boot-mark {
        display: inline-grid;
        place-items: center;
        width: 56px;
        height: 56px;
        margin: 0 auto 18px;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--boot-brand), var(--boot-brand-deep));
        color: #fff;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.04em;
        box-shadow: 0 4px 12px -2px rgba(201, 100, 66, 0.5);
      }

      .boot-card h1 {
        margin: 0 0 8px;
        font-size: 22px;
        font-weight: 650;
        line-height: 1.25;
        letter-spacing: -0.02em;
        color: var(--boot-text-dark);
      }

      .boot-card p {
        margin: 0;
        color: var(--boot-muted-dark);
        font-size: 13.5px;
        line-height: 1.55;
      }

      .boot-card::after {
        content: "";
        display: block;
        width: 24px;
        height: 24px;
        margin: 18px auto 0;
        border: 2px solid var(--boot-brand);
        border-top-color: transparent;
        border-radius: 50%;
        animation: boot-spin 0.7s linear infinite;
      }

      @keyframes boot-spin { to { transform: rotate(360deg); } }

      html:not(.dark) .boot-shell {
        background: var(--boot-bg-light);
        background-image:
          radial-gradient(at 20% 12%, rgba(201, 100, 66, 0.07) 0px, transparent 55%),
          radial-gradient(at 82% 88%, rgba(201, 100, 66, 0.04) 0px, transparent 55%);
      }

      html:not(.dark) .boot-card {
        background: var(--boot-card-light);
        border-color: var(--boot-border-light);
        box-shadow: 0 8px 28px rgba(35, 28, 20, 0.08), 0 2px 6px rgba(35, 28, 20, 0.04);
      }

      html:not(.dark) .boot-card h1 { color: var(--boot-text-light); }
      html:not(.dark) .boot-card p { color: var(--boot-muted-light); }
    </style>
  </head>
  <body>
    <div id="app">
      <main class="boot-shell">
        <section class="boot-card">
          <span class="boot-mark">M</span>
          <h1>Mongoose</h1>
          <p>正在加载控制台…</p>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      (function () {
        var mounted = false;
        var observer = new MutationObserver(function () {
          if (document.querySelector('.shell') || document.querySelector('.login-shell')) {
            mounted = true;
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('app'), { childList: true, subtree: true });
        setTimeout(function () {
          if (!mounted) {
            observer.disconnect();
            var reloaded = sessionStorage.getItem('_mg_reload');
            if (!reloaded) {
              sessionStorage.setItem('_mg_reload', '1');
              location.reload();
            } else {
              sessionStorage.removeItem('_mg_reload');
              var p = document.querySelector('.boot-card p');
              if (p) p.textContent = '加载失败，请清除浏览器缓存后重试 (Ctrl+Shift+R)';
            }
          }
        }, 3000);
        window.addEventListener('load', function () {
          sessionStorage.removeItem('_mg_reload');
        });
      })();
    </script>
  </body>
</html>
